appId: com.braincue.copilot
productName: BrainCue Copilot
# Where `electron-builder --publish` uploads installers. Creates a DRAFT GitHub
# release named v${version}; the maintainer reviews and publishes it. The CI job
# (.github/workflows/release.yml) provides GH_TOKEN.
publish:
  provider: github
  owner: tpikachu
  repo: Interview-Copilot
directories:
  output: release
  buildResources: resources
files:
  - out/**/*
  - package.json
# Drizzle migrations must live on disk at process.resourcesPath/drizzle (see
# src/main/db/index.ts), NOT inside app.asar — the migrator reads them by path.
extraResources:
  - from: drizzle
    to: drizzle
  # Tray icon is loaded at runtime by nativeImage from process.resourcesPath.
  - from: resources/icon.png
    to: icon.png
asarUnpack:
  # native modules must stay unpacked
  - "**/node_modules/better-sqlite3/**"
  # koffi loads its prebuilt .node from disk (the display-affinity oracle)
  - "**/node_modules/koffi/**"
win:
  icon: resources/icon.ico
  target:
    - nsis
mac:
  icon: resources/icon.png
  target:
    - dmg
  category: public.app-category.productivity
linux:
  icon: resources/icon.png
  target:
    - AppImage
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
