appId: com.aiinterview.assistant
productName: AI Interview Assistant
directories:
  output: release
  buildResources: resources
files:
  - out/**/*
  - package.json
# Drizzle migrations must live on disk at process.resourcesPath/drizzle (see
# src/main/db/index.ts), NOT inside app.asar — the migrator reads them by path.
extraResources:
  - from: drizzle
    to: drizzle
asarUnpack:
  # native module must stay unpacked
  - "**/node_modules/better-sqlite3/**"
win:
  icon: resources/icon.ico
  target:
    - nsis
mac:
  icon: resources/icon.png
  target:
    - dmg
  category: public.app-category.productivity
linux:
  icon: resources/icon.png
  target:
    - AppImage
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
